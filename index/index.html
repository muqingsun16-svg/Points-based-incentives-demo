<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>K-Hub · 开源协作积分中心</title>
  <style>
    :root {
      --bg-root: #06060f;
      --bg-surface: #0c0c1d;
      --bg-card: rgba(18, 16, 42, 0.55);
      --purple-400: #a78bfa;
      --purple-500: #8b5cf6;
      --purple-600: #7c3aed;
      --cyan-400: #22d3ee;
      --cyan-500: #06b6d4;
      --text-primary: #e8ecf2;
      --text-secondary: #a0aec0;
      --text-muted: #64748b;
      --border-subtle: rgba(139, 92, 246, 0.15);
      --border-glow: rgba(139, 92, 246, 0.5);
      --radius-lg: 20px;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-root); color: var(--text-primary);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; inset:0; pointer-events:none; z-index:0;
      background-image:
        linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }
    #app { position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }

    /* 导航栏 */
    .navbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 40px; height:68px; background:rgba(12,12,29,0.78);
      backdrop-filter:blur(24px); border-bottom:1px solid var(--border-subtle);
      position:sticky; top:0; z-index:100;
    }
    .navbar-left { display:flex; align-items:center; gap:28px; }
    .logo { display:flex; align-items:center; gap:10px; font-size:22px; font-weight:800; cursor:pointer; color:var(--text-primary); }
    .logo-icon {
      width:36px; height:36px; background:linear-gradient(135deg, var(--purple-500), var(--cyan-400));
      border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff;
    }
    .nav-links { display:flex; list-style:none; gap:4px; }
    .nav-links a {
      text-decoration:none; color:var(--text-secondary); font-size:14px; padding:8px 14px; border-radius:8px;
      transition:0.2s; white-space:nowrap;
    }
    .nav-links a:hover, .nav-links a.active { color:var(--text-primary); background:rgba(139,92,246,0.12); }
    .navbar-right { display:flex; align-items:center; gap:16px; }
    .points-display {
      display:flex; align-items:center; gap:8px;
      background:rgba(139,92,246,0.12); border:1px solid var(--border-subtle);
      border-radius:24px; padding:6px 18px 6px 6px; cursor:pointer;
      transition:0.3s;
    }
    .points-display:hover { border-color:var(--border-glow); }
    .points-icon { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg, var(--purple-500), var(--cyan-400)); display:flex; align-items:center; justify-content:center; font-size:14px; }
    .points-value { font-weight:700; color:var(--cyan-400); font-family:var(--font-mono); }
    .points-label { font-size:12px; color:var(--text-muted); }
    .avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#4f46e5,#7c3aed); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; }

    /* 主内容区 */
    .main-container {
      display:grid; grid-template-columns:1fr 1fr; gap:28px;
      padding:20px 40px 40px; max-width:1440px; margin:0 auto; flex:1;
    }
    .section-panel { display:flex; flex-direction:column; gap:16px; }
    .section-title { font-size:20px; font-weight:700; display:flex; align-items:center; gap:10px; }

    .task-card, .reward-card {
      background:var(--bg-card); border:1px solid var(--border-subtle);
      border-radius:var(--radius-lg); padding:18px 20px; transition:0.3s; cursor:pointer;
    }
    .task-card:hover, .reward-card:hover { border-color:var(--border-glow); transform:translateY(-2px); }

    .status-badge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:600; }
    .status-claimed { background:rgba(251,191,36,0.15); color:#fbbf24; }
    .status-submitted { background:rgba(59,130,246,0.15); color:#60a5fa; }
    .status-completed { background:rgba(139,92,246,0.2); color:var(--purple-400); }

    .btn {
      padding:8px 18px; border-radius:20px; font-weight:600; border:none;
      cursor:pointer; transition:0.2s; background:var(--purple-600); color:#fff;
    }
    .btn-outline {
      background:transparent; border:1.5px solid rgba(6,182,212,0.4); color:var(--cyan-400);
    }
    .community-btn {
      background:linear-gradient(135deg, var(--purple-600), var(--cyan-500));
      border:none; color:#fff; padding:10px 24px; border-radius:24px; font-weight:700;
      cursor:pointer; transition:0.3s; text-decoration:none; display:inline-block;
      font-size:15px; margin:12px 0 0;
    }
    .community-btn:hover { opacity:0.9; transform:scale(1.02); box-shadow:0 0 24px rgba(139,92,246,0.4); }

    /* 模态框 */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px);
      z-index:200; display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:0.3s;
    }
    .modal-overlay.active { opacity:1; pointer-events:auto; }
    .modal {
      background:var(--bg-surface); border:1px solid var(--border-subtle);
      border-radius:24px; padding:28px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto;
      color:var(--text-primary);
    }
    .close-modal { float:right; background:none; border:none; color:#fff; font-size:24px; cursor:pointer; }

    .leaderboard-table { width:100%; border-collapse:collapse; margin-top:16px; }
    .leaderboard-table th, .leaderboard-table td { padding:10px 12px; }
    .leaderboard-table th { color:var(--text-muted); font-size:12px; border-bottom:1px solid var(--border-subtle); }

    @media (max-width:960px) {
      .main-container { grid-template-columns:1fr; padding:16px; }
      .navbar { padding:0 16px; }
      .nav-links a { font-size:12px; padding:6px 8px; }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- 导航栏 -->
  <header class="navbar">
    <div class="navbar-left">
      <div class="logo" onclick="scrollToTop()">
        <div class="logo-icon">K</div><span>K-Hub</span>
      </div>
      <nav>
        <ul class="nav-links" id="nav-links">
          <li><a href="#" data-nav="tasks" class="active" onclick="scrollToSection('tasks');return false;">我的任务</a></li>
          <li><a href="#" data-nav="rewards" onclick="scrollToSection('rewards');return false;">积分兑换</a></li>
          <li><a href="#" data-nav="leaderboard" onclick="openLeaderboard();return false;">星光榜</a></li>
          <li><a href="#" data-nav="medals" onclick="openMedalWall();return false;">我的勋章</a></li>
          <li><a href="#" data-nav="history" onclick="openPointsHistory();return false;">积分收支明细</a></li>
        </ul>
      </nav>
    </div>
    <div class="navbar-right">
      <div class="points-display" onclick="openPointsHistory()" title="查看积分明细">
        <div class="points-icon">⚡</div>
        <div>
          <span class="points-value" id="points-value">2,450</span>
          <span class="points-label">现有积分</span>
        </div>
      </div>
      <div class="avatar" title="李">李</div>
    </div>
  </header>

  <!-- 激励语 + 社区按钮 -->
  <div style="text-align:center; padding: 20px 16px 8px;">
    <h2 style="font-size:24px; background:linear-gradient(135deg,#a78bfa,#22d3ee); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">每一份贡献，都在点亮罕见病研究的星光</h2>
    <a href="https://khub.gulu9832.xyz/" target="_blank" class="community-btn">🌐 进入社区协作平台</a>
  </div>

  <!-- 主内容区：双栏布局 -->
  <main class="main-container" id="main-content">
    <div class="section-panel" id="tasks-panel">
      <div class="section-title"><span>📋</span> 我的任务</div>
      <div id="tasks-container"></div>
      <div style="text-align:center; color:var(--text-muted); padding:20px;">— 到底啦，快去社区平台领取更多任务吧 —</div>
    </div>
    <div class="section-panel" id="rewards-panel">
      <div class="section-title"><span>🎁</span> 积分兑换</div>
      <div id="rewards-container"></div>
    </div>
  </main>

  <!-- 提交成果模态框 -->
  <div class="modal-overlay" id="submit-modal">
    <div class="modal">
      <button class="close-modal" onclick="closeModal('submit-modal')">&times;</button>
      <h3>📤 提交成果兑换积分</h3>
      <p id="submit-task-title" style="margin:12px 0;"></p>
      <label>上传文件：</label>
      <input type="file" style="margin:8px 0; display:block; color:var(--text-secondary);">
      <textarea placeholder="备注说明..." style="width:100%; margin-top:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border-subtle); border-radius:8px; padding:10px; color:#fff;" rows="3"></textarea>
      <button class="btn" style="margin-top:12px;" onclick="submitTask()">确认提交</button>
    </div>
  </div>

  <!-- 积分收支明细模态框 -->
  <div class="modal-overlay" id="history-modal">
    <div class="modal">
      <button class="close-modal" onclick="closeModal('history-modal')">&times;</button>
      <h3>📊 积分收支明细</h3>
      <div id="history-list" style="max-height:60vh; overflow-y:auto; margin-top:12px;"></div>
    </div>
  </div>

  <!-- 星光榜模态框 -->
  <div class="modal-overlay" id="leaderboard-modal">
    <div class="modal" style="max-width:600px;">
      <button class="close-modal" onclick="closeModal('leaderboard-modal')">&times;</button>
      <h3>🏆 星光榜</h3>
      <div style="display:flex; gap:8px; margin:12px 0;">
        <button class="btn-outline" onclick="switchLeaderboard('day')">日榜</button>
        <button class="btn-outline" onclick="switchLeaderboard('week')">周榜</button>
        <button class="btn-outline" onclick="switchLeaderboard('month')">月榜</button>
        <button class="btn-outline" onclick="switchLeaderboard('quarter')">季度</button>
      </div>
      <table class="leaderboard-table">
        <thead><tr><th>排名</th><th>用户</th><th>累计积分</th><th>勋章</th></tr></thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 我的勋章模态框 -->
  <div class="modal-overlay" id="medal-modal">
    <div class="modal" style="max-width:550px;">
      <button class="close-modal" onclick="closeModal('medal-modal')">&times;</button>
      <h3>🏅 我的勋章</h3>
      <div id="medal-wall" style="display:flex; flex-wrap:wrap; gap:20px; margin:16px 0;"></div>
      <div style="border-top:1px solid var(--border-subtle); padding-top:16px;">
        <p style="font-size:14px;">✨ 季度卓越者勋章：集齐4个<strong>月度卓越者勋章</strong>可合成</p>
        <p style="font-size:14px;">👑 年度卓越者勋章：集齐4个<strong>季度卓越者勋章</strong>可合成</p>
        <p style="font-size:14px;">📜 荣誉证书：任意勋章可1:1兑换官方证书</p>
        <button class="btn-outline" style="margin-top:8px;" onclick="synthesizeMedal()">🔨 合成勋章</button>
        <button class="btn-outline" style="margin-left:8px;" onclick="exchangeCertificate()">📜 兑换荣誉证书</button>
      </div>
    </div>
  </div>

  <div id="toast" style="position:fixed; top:88px; left:50%; transform:translateX(-50%); background:rgba(18,16,42,0.95); border:1px solid var(--border-subtle); border-radius:12px; padding:12px 24px; z-index:999; opacity:0; transition:0.3s; pointer-events:none;">提示</div>
</div>

<script>
  (function() {
    // ---------- 数据 ----------
    const projects = [
      { id:'p3', name:'无障碍工具开发', icon:'♿' },
      { id:'p4', name:'健康应用', icon:'❤️' }
    ];
    // 仅保留用户指定的新任务，状态默认已领取（可直接提交成果）
    const tasksData = [
      { id:3, projectId:'p3', title:'开发无障碍阅读器插件', desc:'为视障患者提供阅读辅助', points:800 },
      { id:4, projectId:'p4', title:'健康患者数据可视化面板', desc:'搭建罕见病数据看板', points:600 },
      { id:5, projectId:'p4', title:'在线问诊预约系统', desc:'优化罕见病问诊流程', points:700 },
      { id:6, projectId:'p3', title:'药品提醒小程序', desc:'帮助患者按时服药', points:400 },
      { id:7, projectId:'p4', title:'康复训练视频平台', desc:'提供康复指导视频', points:550 }
    ];

    const rewardsData = [
      { id:1, category:'ai-membership', title:'妙哒AI月卡', desc:'GPT-4o 每月1000次', cost:800, icon:'🤖' },
      { id:2, category:'ai-membership', title:'妙哒AI半年卡', desc:'半年无限次使用', cost:4000, icon:'🧠' },
      { id:3, category:'ai-membership', title:'妙哒AI年卡', desc:'全年无限次，优先体验新功能', cost:7000, icon:'👑' }
    ];

    // 用户数据
    let userPoints = 2450;
    // 任务状态初始化：所有任务均为“已领取”(claimed)，可直接提交
    const taskStatusMap = new Map(tasksData.map(t => [t.id, 'claimed']));
    let currentSubmitTaskId = null;

    // 积分历史 (多用户示例)
    const pointsHistory = [
      { userId:'user_li', type:'income', amount:500, balance:500, desc:'完成翻译任务', time:Date.now()-86400000*2 },
      { userId:'user_li', type:'income', amount:300, balance:800, desc:'数据清洗', time:Date.now()-86400000*5 },
      { userId:'user_zhang', type:'income', amount:800, balance:800, desc:'无障碍插件开发', time:Date.now()-3600000*5 },
      { userId:'user_zhang', type:'income', amount:600, balance:1400, desc:'数据面板', time:Date.now()-86400000*4 },
      { userId:'user_wang', type:'income', amount:1200, balance:1200, desc:'文献翻译', time:Date.now()-86400000*1 },
      { userId:'user_wang', type:'income', amount:400, balance:1600, desc:'药品提醒', time:Date.now()-86400000*3 },
      { userId:'user_zhao', type:'income', amount:700, balance:700, desc:'问诊系统', time:Date.now()-86400000*6 },
      { userId:'user_sun', type:'income', amount:900, balance:900, desc:'康复视频', time:Date.now()-86400000*2 },
      { userId:'user_qian', type:'income', amount:1100, balance:1100, desc:'翻译任务', time:Date.now()-86400000*8 },
    ];

    // 勋章系统
    const userMedals = {
      monthly: ['2025-01', '2025-02', '2025-03'], // 已获得的月度卓越者勋章
      quarterly: [],
      yearly: []
    };

    // DOM
    const $pointsValue = document.getElementById('points-value');
    const $tasksContainer = document.getElementById('tasks-container');
    const $rewardsContainer = document.getElementById('rewards-container');
    const $toast = document.getElementById('toast');

    function format(n){ return n.toLocaleString('en-US'); }
    function showToast(msg){
      $toast.textContent = msg; $toast.style.opacity = '1';
      setTimeout(() => $toast.style.opacity = '0', 2200);
    }
    function updatePointsDisplay(){ $pointsValue.textContent = format(userPoints); }

    // 渲染我的任务（按钮统一为“提交成果”）
    function renderTasks(){
      const html = tasksData.map(t => {
        const proj = projects.find(p => p.id === t.projectId);
        const status = taskStatusMap.get(t.id) || 'claimed';
        const statusText = {claimed:'待提交', submitted:'审核中', completed:'已完成'}[status] || '待提交';
        const statusClass = `status-${status}`;
        const btnDisabled = (status === 'submitted' || status === 'completed') ? 'disabled' : '';
        return `<div class="task-card">
          <div style="display:flex; justify-content:space-between;">
            <span style="color:var(--cyan-400);">${proj?.icon||''} ${proj?.name||''}</span>
            <span class="status-badge ${statusClass}">${statusText}</span>
          </div>
          <h4 style="margin:8px 0;">${t.title}</h4>
          <p style="font-size:13px; color:var(--text-secondary);">${t.desc}</p>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px;">
            <span style="font-weight:700; color:var(--purple-400);">🪙 ${format(t.points)}</span>
            <button class="btn" ${btnDisabled} onclick="event.stopPropagation(); openSubmitModal(${t.id})">提交成果兑换积分</button>
          </div>
        </div>`;
      }).join('');
      $tasksContainer.innerHTML = html;
    }

    // 提交成果模态框
    window.openSubmitModal = function(taskId){
      currentSubmitTaskId = taskId;
      const task = tasksData.find(t => t.id === taskId);
      document.getElementById('submit-task-title').textContent = task?.title || '';
      document.getElementById('submit-modal').classList.add('active');
    };
    window.submitTask = function(){
      if(!currentSubmitTaskId) return;
      taskStatusMap.set(currentSubmitTaskId, 'submitted');
      document.getElementById('submit-modal').classList.remove('active');
      showToast('成果已提交，审核中，请耐心等待…');
      renderAll();
      // 模拟审核通过 (5秒后)
      setTimeout(() => {
        const task = tasksData.find(t => t.id === currentSubmitTaskId);
        if(task && taskStatusMap.get(currentSubmitTaskId) === 'submitted'){
          taskStatusMap.set(currentSubmitTaskId, 'completed');
          userPoints += task.points;
          pointsHistory.push({userId:'user_li', type:'income', amount:task.points, balance:userPoints, desc:`完成任务: ${task.title}`, time:Date.now()});
          updatePointsDisplay();
          renderAll();
          showToast(`🎉 审核通过！+${format(task.points)} 积分`);
          checkMonthlyMedal();
        }
      }, 5000);
    };

    // 渲染积分兑换
    function renderRewards(){
      let html = `<h4 style="color:var(--text-secondary); margin-bottom:8px;">🤖 AI 会员</h4>`;
      rewardsData.forEach(r => {
        const can = userPoints >= r.cost;
        html += `<div class="reward-card" style="margin-bottom:12px; display:flex; align-items:center; gap:12px;">
          <div style="font-size:28px;">${r.icon}</div>
          <div style="flex:1;"><strong>${r.title}</strong><div style="font-size:12px;color:var(--text-muted);">${r.desc}</div></div>
          <div style="text-align:right;"><span style="font-weight:700;color:var(--cyan-400);">${format(r.cost)}</span><br>
          <button class="btn-outline" style="margin-top:4px;" ${!can?'disabled':''} onclick="event.stopPropagation(); redeemReward(${r.id})">${can?'兑换':'积分不足'}</button></div>
        </div>`;
      });
      $rewardsContainer.innerHTML = html;
    }

    window.redeemReward = function(rewardId){
      const reward = rewardsData.find(r => r.id === rewardId);
      if(!reward || userPoints < reward.cost){ showToast('积分不足'); return; }
      userPoints -= reward.cost;
      pointsHistory.push({userId:'user_li', type:'expense', amount:-reward.cost, balance:userPoints, desc:`兑换: ${reward.title}`, time:Date.now()});
      updatePointsDisplay();
      renderAll();
      showToast(`✅ 兑换成功！消耗 ${format(reward.cost)} 积分`);
    };

    // 积分收支明细
    window.openPointsHistory = function(){
      const userHistory = pointsHistory.filter(h => h.userId === 'user_li').reverse();
      const list = document.getElementById('history-list');
      list.innerHTML = userHistory.length === 0 ? '<p>暂无记录</p>' :
        userHistory.map(h => `<div style="border-bottom:1px solid var(--border-subtle); padding:8px 0;">
          <span style="color:${h.type==='income'?'var(--success)':'var(--danger)'}">${h.type==='income'?'+':'-'}${format(Math.abs(h.amount))}</span>
          <span style="margin-left:12px;">${h.desc}</span>
          <span style="float:right; font-size:12px; color:var(--text-muted);">${new Date(h.time).toLocaleString()}</span>
        </div>`).join('');
      document.getElementById('history-modal').classList.add('active');
    };

    // 星光榜
    function computeLeaderboard(period){
      const now = Date.now();
      const ranges = {day:86400000, week:604800000, month:2592000000, quarter:7776000000};
      const since = now - (ranges[period]||ranges.month);
      const userMap = {
        'user_li': { name:'李', avatar:'李' },
        'user_zhang': { name:'张三', avatar:'张' },
        'user_wang': { name:'王五', avatar:'王' },
        'user_zhao': { name:'赵六', avatar:'赵' },
        'user_sun': { name:'孙七', avatar:'孙' },
        'user_qian': { name:'钱八', avatar:'钱' }
      };
      const sums = {};
      pointsHistory.forEach(h => {
        if(h.time >= since && h.type === 'income'){
          sums[h.userId] = (sums[h.userId]||0) + h.amount;
        }
      });
      return Object.entries(sums).map(([uid, total]) => ({...userMap[uid], total})).sort((a,b) => b.total - a.total);
    }
    window.switchLeaderboard = function(period){
      const data = computeLeaderboard(period);
      const tbody = document.getElementById('leaderboard-body');
      tbody.innerHTML = data.map((u,i) => {
        let medal = i<3 ? (i===0?'🥇': i===1?'🥈':'🥉') : '';
        return `<tr>
          <td><span style="font-weight:700;">${i+1}</span> ${medal}</td>
          <td>${u.avatar} ${u.name}</td>
          <td>${format(u.total)}</td>
          <td>${i<3?'🏅 卓越者':''}</td>
        </tr>`;
      }).join('');
    };
    window.openLeaderboard = function(){
      document.getElementById('leaderboard-modal').classList.add('active');
      window.switchLeaderboard('month');
    };

    // 我的勋章
    function checkMonthlyMedal(){
      const now = new Date();
      const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
      if(!userMedals.monthly.includes(monthKey)){
        userMedals.monthly.push(monthKey);
        showToast('🏅 恭喜获得本月卓越者勋章！');
      }
    }
    function renderMedalWall(){
      const wall = document.getElementById('medal-wall');
      let html = '';
      userMedals.monthly.forEach(m => html += `<div style="text-align:center;"><span style="font-size:32px;">🌟</span><br>月度勋章<br><small>${m}</small></div>`);
      userMedals.quarterly.forEach(q => html += `<div style="text-align:center;"><span style="font-size:32px;">🏅</span><br>季度勋章<br><small>${q}</small></div>`);
      userMedals.yearly.forEach(y => html += `<div style="text-align:center;"><span style="font-size:32px;">👑</span><br>年度勋章<br><small>${y}</small></div>`);
      wall.innerHTML = html || '<p style="color:var(--text-muted);">暂无勋章，快去提交成果吧</p>';
    }
    window.openMedalWall = function(){
      renderMedalWall();
      document.getElementById('medal-modal').classList.add('active');
    };
    window.synthesizeMedal = function(){
      if(userMedals.monthly.length >= 4){
        userMedals.monthly.splice(0,4);
        const q = '2025-Q'+(userMedals.quarterly.length+1);
        userMedals.quarterly.push(q);
        showToast('🎉 合成季度卓越者勋章！');
      } else if(userMedals.quarterly.length >= 4){
        userMedals.quarterly.splice(0,4);
        userMedals.yearly.push('2025');
        showToast('👑 合成年度卓越者勋章！');
      } else {
        showToast('勋章不足，无法合成');
      }
      renderMedalWall();
    };
    window.exchangeCertificate = function(){
      const totalMedals = userMedals.monthly.length + userMedals.quarterly.length + userMedals.yearly.length;
      if(totalMedals === 0){ showToast('没有可兑换的勋章'); return; }
      if(userMedals.monthly.length>0) userMedals.monthly.pop();
      else if(userMedals.quarterly.length>0) userMedals.quarterly.pop();
      else userMedals.yearly.pop();
      showToast('📜 已兑换荣誉证书，勋章已消耗');
      renderMedalWall();
    };

    // 关闭模态框
    window.closeModal = function(id){
      document.getElementById(id).classList.remove('active');
    };

    // 导航滚动
    window.scrollToSection = function(section){
      if(section === 'tasks') document.getElementById('tasks-panel').scrollIntoView({behavior:'smooth'});
      else if(section === 'rewards') document.getElementById('rewards-panel').scrollIntoView({behavior:'smooth'});
      updateNavActive(section);
    };
    window.scrollToTop = function(){
      window.scrollTo({top:0, behavior:'smooth'});
    };
    function updateNavActive(section){
      document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
      const activeLink = document.querySelector(`.nav-links a[data-nav="${section}"]`);
      if(activeLink) activeLink.classList.add('active');
    }

    function renderAll(){ renderTasks(); renderRewards(); }

    // 初始化
    updatePointsDisplay();
    renderAll();
    // 预置勋章示例
    if(userMedals.monthly.length === 0) userMedals.monthly = ['2025-01','2025-02','2025-03'];
  })();
</script>
</body>
</html>
